<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BALTORATORA · Scientia Potentia Est</title>
    <meta name="description" content="BALTORATORA — Scientia Potentia Est. The cosmos, daily." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05060d;
        --bg-2: #0a0c18;
        --text: #eef1f8;
        --muted: #9aa0b8;
        --accent: #ff5d8f; /* pink-magenta glow, echoes the app */
        --accent-2: #c2185b;
        --border: rgba(255, 255, 255, 0.1);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        -webkit-text-size-adjust: 100%;
      }
      body {
        background:
          radial-gradient(1100px 700px at 80% -10%, rgba(194, 24, 91, 0.22), transparent),
          radial-gradient(900px 600px at -10% 20%, rgba(91, 60, 255, 0.18), transparent),
          var(--bg);
        color: var(--text);
        font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }
      /* starfield */
      #stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: #fff;
        opacity: 0.7;
        animation: twinkle var(--dur) ease-in-out infinite alternate;
      }
      @keyframes twinkle {
        from {
          opacity: 0.15;
        }
        to {
          opacity: 0.9;
        }
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: clamp(48px, 9vh, 110px) max(20px, env(safe-area-inset-left))
          max(56px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-right));
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      /* hero */
      h1 {
        /* Sized by viewport width + capped so BALTORATORA always fits on ONE
           line — never wraps, never overflows. */
        font-size: clamp(24px, 11vw, 104px);
        white-space: nowrap;
        font-weight: 800;
        letter-spacing: 0.05em;
        margin: 0;
        line-height: 1.05;
        background: linear-gradient(180deg, #ffffff 0%, #ffd7e6 60%, var(--accent) 130%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 60px rgba(255, 93, 143, 0.25);
      }
      .tagline {
        margin-top: 18px;
        font-style: italic;
        font-weight: 400;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        font-size: clamp(11px, 2.4vw, 16px);
        color: var(--muted);
      }
      .tagline::before,
      .tagline::after {
        content: "·";
        margin: 0 0.7em;
        color: var(--accent);
      }

      /* APOD */
      .apod {
        margin-top: clamp(44px, 8vh, 80px);
        width: 100%;
        max-width: 620px;
      }
      .apod-eyebrow {
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
        font-weight: 600;
      }
      .planets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      .planet {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .planet-img {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #06070f;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .planet-img img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .planet-name {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text);
      }
      @media (max-width: 520px) {
        .planets {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }
      }

      /* calendar */
      .cal {
        margin-top: clamp(44px, 8vh, 80px);
        width: 100%;
        max-width: 420px;
      }
      .cal-head {
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
        font-weight: 600;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .cal-dow {
        font-size: 11px;
        color: var(--muted);
        padding-bottom: 6px;
        font-weight: 600;
      }
      .cal-day {
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--text);
        border-radius: 50%;
        border: 1px solid transparent;
      }
      .cal-day.empty {
        visibility: hidden;
      }
      .cal-day.today {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        font-weight: 700;
        box-shadow: 0 0 24px rgba(255, 93, 143, 0.4);
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: clamp(22px, 4vh, 34px);
        padding: 15px 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: clamp(14px, 3.4vw, 16px);
        letter-spacing: 0.01em;
        box-shadow: 0 10px 30px rgba(255, 93, 143, 0.35);
        animation: cta-float 2.8s ease-in-out infinite;
        transition: filter 0.15s ease;
      }
      .cta:hover {
        filter: brightness(1.08);
      }
      .cta-arrow {
        transition: transform 0.2s ease;
      }
      .cta:hover .cta-arrow {
        transform: translateX(4px);
      }
      @keyframes cta-float {
        0%,
        100% {
          transform: translateY(0);
          box-shadow: 0 10px 30px rgba(255, 93, 143, 0.3);
        }
        50% {
          transform: translateY(-7px);
          box-shadow: 0 20px 44px rgba(255, 93, 143, 0.5);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .cta {
          animation: none;
        }
      }

      .cta-ghost {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: clamp(12px, 2.5vh, 20px);
        padding: 12px 24px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid rgba(255, 93, 143, 0.35);
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: clamp(13px, 3vw, 14px);
        letter-spacing: 0.02em;
        transition: background 0.2s ease, border-color 0.2s ease;
      }
      .cta-ghost:hover {
        background: rgba(255, 93, 143, 0.08);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="stars" aria-hidden="true"></div>

    <main class="wrap">
      <h1>BALTORATORA</h1>
      <div class="tagline">Scientia Potentia Est</div>

      <a class="cta" href="https://demo.baltoratora.my">
        Explore the daily STEM dashboard <span class="cta-arrow">→</span>
      </a>

      <section class="apod" aria-label="Our solar system">
        <div class="apod-eyebrow">Our solar system</div>
        <div class="planets">
          <div class="planet"><div class="planet-img"><img src="img/sun.jpg" alt="The Sun" loading="lazy" /></div><div class="planet-name">Sun</div></div>
          <div class="planet"><div class="planet-img"><img src="img/mercury.jpg" alt="Mercury" loading="lazy" /></div><div class="planet-name">Mercury</div></div>
          <div class="planet"><div class="planet-img"><img src="img/venus.jpg" alt="Venus" loading="lazy" /></div><div class="planet-name">Venus</div></div>
          <div class="planet"><div class="planet-img"><img src="img/earth.jpg" alt="Earth" loading="lazy" /></div><div class="planet-name">Earth</div></div>
          <div class="planet"><div class="planet-img"><img src="img/mars.jpg" alt="Mars" loading="lazy" /></div><div class="planet-name">Mars</div></div>
          <div class="planet"><div class="planet-img"><img src="img/jupiter.jpg" alt="Jupiter" loading="lazy" /></div><div class="planet-name">Jupiter</div></div>
          <div class="planet"><div class="planet-img"><img src="img/saturn.jpg" alt="Saturn" loading="lazy" /></div><div class="planet-name">Saturn</div></div>
          <div class="planet"><div class="planet-img"><img src="img/uranus.jpg" alt="Uranus" loading="lazy" /></div><div class="planet-name">Uranus</div></div>
          <div class="planet"><div class="planet-img"><img src="img/neptune.jpg" alt="Neptune" loading="lazy" /></div><div class="planet-name">Neptune</div></div>
        </div>
      </section>

      <section class="cal" aria-label="Calendar">
        <div class="cal-head" id="cal-head"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </section>

      <a class="cta-ghost" href="/journal">Journal →</a>

    </main>

    <script>
      // --- starfield ---
      (function () {
        const host = document.getElementById("stars");
        const n = Math.min(160, Math.floor((window.innerWidth * window.innerHeight) / 9000));
        const frag = document.createDocumentFragment();
        for (let i = 0; i < n; i++) {
          const s = document.createElement("div");
          s.className = "star";
          const size = Math.random() < 0.15 ? 3 : Math.random() < 0.5 ? 2 : 1;
          s.style.width = s.style.height = size + "px";
          s.style.left = Math.random() * 100 + "%";
          s.style.top = Math.random() * 100 + "%";
          s.style.setProperty("--dur", (2 + Math.random() * 4).toFixed(2) + "s");
          s.style.animationDelay = (Math.random() * 4).toFixed(2) + "s";
          frag.appendChild(s);
        }
        host.appendChild(frag);
      })();

      // --- current-month calendar (decorative) ---
      (function () {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth();
        const today = now.getDate();
        const monthName = now.toLocaleString(undefined, { month: "long" });
        document.getElementById("cal-head").textContent = monthName + " " + y;

        const grid = document.getElementById("cal-grid");
        const dows = ["S", "M", "T", "W", "T", "F", "S"];
        dows.forEach((d) => {
          const el = document.createElement("div");
          el.className = "cal-dow";
          el.textContent = d;
          grid.appendChild(el);
        });
        const firstDow = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        for (let i = 0; i < firstDow; i++) {
          const e = document.createElement("div");
          e.className = "cal-day empty";
          grid.appendChild(e);
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const e = document.createElement("div");
          e.className = "cal-day" + (d === today ? " today" : "");
          e.textContent = d;
          grid.appendChild(e);
        }
      })();

    </script>
  </body>
</html>
